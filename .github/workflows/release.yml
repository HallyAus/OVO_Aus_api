name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../ovo_energy_au.zip ovo_energy_au/

      - name: Build release notes (referrals + auto-generated changelog)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prev="$(gh api repos/${{ github.repository }}/releases/latest --jq .tag_name 2>/dev/null || echo '')"
          if [ -n "$prev" ] && [ "$prev" != "$tag" ]; then
            auto=$(gh api -X POST repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$tag" -f previous_tag_name="$prev" --jq .body)
          else
            auto=$(gh api -X POST repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$tag" --jq .body)
          fi
          {
            echo '## 💚 Support this project — it'"'"'s my only income from it'
            echo ''
            echo 'Referrals below are the only thing funding ongoing development. Both you and I get credit.'
            echo ''
            echo '### ⭐ [Star on GitHub](https://github.com/HallyAus/OVO_Aus_api) — takes two seconds'
            echo ''
            echo '### 🎁 OVO Energy — $120–$180 credit'
            echo '👉 **[www.ovoenergy.com.au/refer/daniel16485](https://www.ovoenergy.com.au/refer/daniel16485)**'
            echo ''
            echo '- ✅ $120 credit on standard plans / $180 on The EV Plan'
            echo '- ✅ Paid over 12 months — both you and I get credit'
            echo ''
            echo '### 🛰️ Starlink — 1 month free'
            echo '👉 **[starlink.com/residential?referral=RC-2455784-77014-69](https://starlink.com/residential?referral=RC-2455784-77014-69&app_source=share)**'
            echo ''
            echo '---'
            echo ''
            printf '%s\n' "$auto"
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ovo_energy_au.zip
          body_path: release-notes.md
