# OVO Energy Australia - Monthly Charges Dashboard
# Detailed daily breakdown graphs for the current billing month
#
# Required custom cards (install via HACS):
# - apexcharts-card: https://github.com/RomRider/apexcharts-card

type: vertical-stack
cards:
  # Monthly Summary Cards
  - type: horizontal-stack
    cards:
      - type: entity
        entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        name: Solar This Month
        icon: mdi:solar-power

      - type: entity
        entity: sensor.ovo_energy_au_30264061_monthly_solar_charge_2
        name: Solar Credit
        icon: mdi:cash-plus

      - type: entity
        entity: sensor.ovo_energy_au_30264061_monthly_grid_charge_2
        name: Grid Cost
        icon: mdi:currency-usd

  # Daily Solar Consumption Graph
  - type: custom:apexcharts-card
    header:
      show: true
      title: Daily Solar Consumption This Month
      show_states: true
      colorize_states: true
    graph_span: 1month
    span:
      start: month
    series:
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        name: Solar kWh
        type: column
        color: orange
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), day.consumption];
          });
        show:
          in_header: false
    apex_config:
      chart:
        height: 250px
      xaxis:
        type: datetime
        labels:
          format: dd
      yaxis:
        - title:
            text: kWh
      tooltip:
        x:
          format: dd MMM yyyy

  # Daily Solar Charge Graph
  - type: custom:apexcharts-card
    header:
      show: true
      title: Daily Solar Credit This Month
      show_states: true
      colorize_states: true
    graph_span: 1month
    span:
      start: month
    series:
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_charge_2
        name: Solar $
        type: column
        color: '#4caf50'
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), Math.abs(day.charge)];
          });
        show:
          in_header: false
    apex_config:
      chart:
        height: 250px
      xaxis:
        type: datetime
        labels:
          format: dd
      yaxis:
        - title:
            text: AUD ($)
          decimalsInFloat: 2
      tooltip:
        x:
          format: dd MMM yyyy

  # Daily Grid Charge Graph
  - type: custom:apexcharts-card
    header:
      show: true
      title: Daily Grid Cost This Month
      show_states: true
      colorize_states: true
    graph_span: 1month
    span:
      start: month
    series:
      - entity: sensor.ovo_energy_au_30264061_monthly_grid_charge_2
        name: Grid $
        type: column
        color: '#f44336'
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), day.charge];
          });
        show:
          in_header: false
    apex_config:
      chart:
        height: 250px
      xaxis:
        type: datetime
        labels:
          format: dd
      yaxis:
        - title:
            text: AUD ($)
          decimalsInFloat: 2
      tooltip:
        x:
          format: dd MMM yyyy

  # Combined Consumption Graph
  - type: custom:apexcharts-card
    header:
      show: true
      title: Daily Solar vs Grid vs Export
      show_states: true
      colorize_states: true
    graph_span: 1month
    span:
      start: month
    series:
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        name: Solar
        type: column
        color: orange
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), day.consumption];
          });
        show:
          in_header: false

      - entity: sensor.ovo_energy_au_30264061_monthly_grid_consumption_2
        name: Grid
        type: column
        color: '#f44336'
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), day.consumption];
          });
        show:
          in_header: false

      - entity: sensor.ovo_energy_au_30264061_monthly_return_to_grid_2
        name: Export
        type: column
        color: '#1E90FF'
        data_generator: |
          const daily = entity.attributes.daily_breakdown || [];
          return daily.map(day => {
            return [new Date(day.date).getTime(), day.consumption];
          });
        show:
          in_header: false
    apex_config:
      chart:
        height: 300px
        stacked: false
      xaxis:
        type: datetime
        labels:
          format: dd
      yaxis:
        - title:
            text: kWh
      tooltip:
        x:
          format: dd MMM yyyy
      legend:
        show: true
        position: top

  # Statistics Card
  - type: entities
    title: Monthly Statistics
    entities:
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        type: attribute
        attribute: daily_average
        name: Avg Daily Solar
        suffix: " kWh"
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        type: attribute
        attribute: daily_max
        name: Max Daily Solar
        suffix: " kWh"
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        type: attribute
        attribute: days_in_month
        name: Days Tracked
      - type: divider
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_consumption_2
        name: Total Solar This Month
      - entity: sensor.ovo_energy_au_30264061_monthly_grid_consumption_2
        name: Total Grid This Month
      - entity: sensor.ovo_energy_au_30264061_monthly_return_to_grid_2
        name: Total Export This Month
      - entity: sensor.ovo_energy_au_30264061_monthly_solar_charge_2
        name: Total Solar Credit
      - entity: sensor.ovo_energy_au_30264061_monthly_grid_charge_2
        name: Total Grid Cost
      - entity: sensor.ovo_energy_au_30264061_monthly_return_to_grid_charge_2
        name: Total Export Credit
