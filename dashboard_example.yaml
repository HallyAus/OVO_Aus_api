            secondary: >
              ${{ states('sensor.ovo_energy_au_monthly_forecast_daily_average_cost') }}
            icon: mdi:chart-line
            icon_color: teal
            entity: sensor.ovo_energy_au_monthly_forecast_daily_average_cost
