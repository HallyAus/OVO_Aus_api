          - type: custom:mushroom-template-card
            primary: Remaining
            secondary: >
              ${{ states('sensor.ovo_energy_au_monthly_forecast_projected_remaining_cost') }}
            icon: mdi:calendar-clock
            icon_color: orange
            entity: sensor.ovo_energy_au_monthly_forecast_projected_remaining_cost
